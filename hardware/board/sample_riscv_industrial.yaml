# Sample Hardware Design: RISC-V Industrial Controller
# MCU: GD32VF103 (RISC-V RV32IMAC, 108MHz)
# Use this to test ebuild analyze for a RISC-V board

board_name: riscv-industrial-ctrl
revision: "A"

mcu:
  part: GD32VF103CBT6
  family: GD32VF103
  core: rv32imac
  clock: 108 MHz
  flash: 128KB internal flash
  ram: 32KB SRAM
  voltage: 3.3V
  features: [risc-v, eclic_interrupt, dma, usb]

peripherals:
  - UART0: PA9/PA10 (RS485 via MAX485, industrial bus)
  - UART1: PA2/PA3 (debug console, 115200 baud)
  - SPI0: PA5/PA6/PA7 (W25Q64 NOR flash, 8MB)
  - I2C0: PB6/PB7 (ADS1115 16-bit ADC, 4-channel)
  - CAN0: PB8/PB9 (CAN 2.0B, industrial sensor bus)
  - ADC: PA0/PA1/PA2/PA3 (4-20mA current loop inputs)
  - PWM: PA8/PA11 (2x relay driver outputs)
  - GPIO: PB12/PB13/PB14/PB15 (DIP switch config, 4-bit)
  - Watchdog: FWDGT (independent watchdog, 3 second timeout)
  - RTC: LSE 32.768kHz crystal
  - USB: PA11/PA12 (USB device, configuration port)
  - DMA: used for UART, SPI, ADC

memory_map:
  flash_base: 0x08000000
  flash_size: 0x20000     # 128KB
  ram_base: 0x20000000
  ram_size: 0x8000        # 32KB
  spi_flash: 0x00000000   # external, 8MB

boot:
  recovery_pin: PB12 (DIP switch bit 0)
  led_status: PC13
  watchdog: 3000ms

power:
  main_supply: 24V industrial (DIN rail)
  regulators:
    - DC-DC 5V (LM2596)
    - LDO 3.3V (AMS1117-3.3)
  isolation: optocoupled RS485 + CAN

use_case: |
  Industrial PLC-style controller. Reads 4-20mA analog sensors,
  communicates over RS485 Modbus and CAN bus. USB for local config.
  External flash for data logging. DIP switches for node addressing.
  24V DIN-rail power. Designed for factory automation.
