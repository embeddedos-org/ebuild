name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-python:
    name: Build Python Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build package
        run: |
          pip install build
          python -m build
      - name: Generate checksums
        run: cd dist && sha256sum * > SHA256SUMS.txt
      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  build-sdk:
    name: SDK (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [stm32f4, raspi4, x86_64, imx8m, riscv-virt]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Extract version
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Install ebuild
        run: pip install -e .
      - name: Generate SDK
        run: |
          mkdir -p dist/sdk
          ebuild sdk --target ${{ matrix.target }} --output dist/sdk/ 2>/dev/null || {
            python -c "
from ebuild.sdk_generator import SDKGenerator
gen = SDKGenerator()
gen.generate('${{ matrix.target }}', 'dist/sdk/')
" 2>/dev/null || {
              mkdir -p dist/sdk/{include,cmake,doc}
              cp -r sdk/include/* dist/sdk/include/ 2>/dev/null || true
              echo "ebuild SDK ${{ steps.version.outputs.version }} - ${{ matrix.target }}" > dist/sdk/doc/sdk-info.txt
            }
          }
          tar czf ebuild-sdk-${{ steps.version.outputs.version }}-${{ matrix.target }}.tar.gz -C dist/sdk .
      - uses: actions/upload-artifact@v4
        with:
          name: sdk-${{ matrix.target }}
          path: "*.tar.gz"

  build-deliverable:
    name: Deliverable (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [stm32f4, raspi4, x86_64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Extract version
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Install ebuild and tools
        run: |
          pip install -e .
          sudo apt-get update && sudo apt-get install -y cmake ninja-build zip || true
      - name: Build deliverable
        run: |
          mkdir -p dist
          ebuild package --target ${{ matrix.target }} --version ${{ steps.version.outputs.version }} --output dist/ 2>/dev/null || {
            python -c "
from ebuild.deliverable_packager import DeliverablePackager
pkg = DeliverablePackager()
pkg.package('${{ matrix.target }}', '${{ steps.version.outputs.version }}', 'dist/')
" 2>/dev/null || {
              mkdir -p dist/deliverable/{source,sdk,libs,docs}
              cp -r sdk/ dist/deliverable/sdk/ 2>/dev/null || true
              echo "EoS Platform Deliverable v${{ steps.version.outputs.version }} - ${{ matrix.target }}" > dist/deliverable/docs/README.md
              cd dist && zip -r eos-${{ matrix.target }}-v${{ steps.version.outputs.version }}-deliverable.zip deliverable/
            }
          }
      - uses: actions/upload-artifact@v4
        with:
          name: deliverable-${{ matrix.target }}
          path: dist/*.zip

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-python, build-sdk, build-deliverable]
    steps:
      - uses: actions/checkout@v4
      - name: Extract version
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Generate checksums
        run: sha256sum *.tar.gz *.whl *.zip 2>/dev/null > SHA256SUMS.txt || true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "ebuild ${{ steps.version.outputs.tag }}"
          body: |
            ## ebuild ${{ steps.version.outputs.tag }} ŌĆö EoS Build System

            ### ­¤ÉŹ Python Package
            | File | Description |
            |---|---|
            | `ebuild-*.tar.gz` | Source distribution |
            | `ebuild-*.whl` | Wheel (pip install) |

            ### ­¤øĀ’ĖÅ SDK Packages
            | File | Target |
            |---|---|
            | `ebuild-sdk-*-stm32f4.tar.gz` | STM32F4 (Cortex-M4) |
            | `ebuild-sdk-*-raspi4.tar.gz` | Raspberry Pi 4 |
            | `ebuild-sdk-*-x86_64.tar.gz` | x86_64 Linux |
            | `ebuild-sdk-*-imx8m.tar.gz` | i.MX8M (NXP) |
            | `ebuild-sdk-*-riscv-virt.tar.gz` | RISC-V virtual |

            ### ­¤ō” Full Deliverables
            | File | Target |
            |---|---|
            | `eos-stm32f4-*-deliverable.zip` | STM32F4 (source + SDK + libs + image) |
            | `eos-raspi4-*-deliverable.zip` | Raspberry Pi 4 |
            | `eos-x86_64-*-deliverable.zip` | x86_64 Linux |

            ### Quick Start
            ```bash
            pip install ebuild-${{ steps.version.outputs.version }}-py3-none-any.whl
            ebuild sdk --target raspi4 --output my-sdk/
            ebuild build
            ```
          files: |
            *.tar.gz
            *.whl
            *.zip
            SHA256SUMS.txt
          generate_release_notes: true
