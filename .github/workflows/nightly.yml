name: Nightly Regression

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  superbuild:
    name: Superbuild (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: flake8 ebuild/ --max-line-length 120
      - name: Test
        run: pytest tests/ -v
      - name: Type check
        run: mypy ebuild/ --ignore-missing-imports
      - name: CMake build (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y cmake ninja-build
          cmake -B build -G Ninja -DEOS_BUILD_TESTS=ON || true
          cmake --build build || true
          ctest --test-dir build --output-on-failure || true

  report:
    name: Nightly Report
    runs-on: ubuntu-latest
    needs: [superbuild]
    if: always()
    steps:
      - name: Results
        run: |
          echo "## Nightly Regression Report"
          echo "| Job | Status |"
          echo "|---|---|"
          echo "| Superbuild | ${{ needs.superbuild.result }} |"
          if [ "${{ needs.superbuild.result }}" != "success" ]; then
            echo "❌ REGRESSION DETECTED"
            exit 1
          fi
          echo "✅ All checks passed"
