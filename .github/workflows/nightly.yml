name: Nightly Regression

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  superbuild:
    name: Superbuild (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: flake8 ebuild/ --max-line-length 120
      - name: Test
        run: pytest tests/ -v

  report:
    name: Nightly Report
    runs-on: ubuntu-latest
    needs: [superbuild]
    if: always()
    steps:
      - name: Results
        run: |
          echo "## Nightly Regression Report — eBuild"
          echo "Date: $(date -u '+%Y-%m-%d %H:%M UTC')"
          echo "| Job | Status |"
          echo "|---|---|"
          echo "| Superbuild | ${{ needs.superbuild.result }} |"
          if [ "${{ needs.superbuild.result }}" != "success" ]; then
            echo "❌ REGRESSION DETECTED"
            exit 1
          fi
          echo "✅ All checks passed"
name: ebuild Nightly

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  nightly:
    name: Nightly (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -e . && pip install pytest flake8 mypy
      - name: Lint
        run: flake8 . --count --max-line-length=120 --statistics
      - name: Test
        run: pytest --tb=short -q
      - name: Type check
        run: mypy . --ignore-missing-imports

      - name: CMake build (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y cmake ninja-build
          cmake -B build -G Ninja -DEBUILD_BUILD_TESTS=ON || true
          cmake --build build || true
          ctest --test-dir build --output-on-failure || true
