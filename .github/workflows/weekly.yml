name: Weekly

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  superbuild:
    name: Superbuild (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ebuild
        run: pip install -e ".[dev]"
      - name: Lint
        run: flake8 ebuild/ --max-line-length 120
      - name: Test
        run: pytest tests/ -v

  report:
    name: Weekly Report
    runs-on: ubuntu-latest
    needs: [superbuild]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Weekly Report — eBuild"
          echo "| Job | Status |"
          echo "|---|---|"
          echo "| Superbuild | ${{ needs.superbuild.result }} |"
